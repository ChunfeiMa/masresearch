# Build the static Next.js UI and deploy to GitHub Pages. Triggered when the
# `data` branch updates (fresh pipeline output) or on manual dispatch.
# Finalized in Phase 5 alongside the web/ app.
name: deploy

on:
  push:
    branches: [data] # redeploy when new data lands
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4

      - name: Pull latest data
        uses: actions/checkout@v4
        with:
          ref: data
          path: web/public/data-src
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site
        working-directory: web
        env:
          # Project Pages serve under /<repo>; must match the GitHub repo name.
          NEXT_PUBLIC_BASE_PATH: /masresearch
        run: |
          # Copy generated JSON into the app's public/data
          mkdir -p public/data
          cp -r public/data-src/data/* public/data/ 2>/dev/null || true
          npm ci
          npm run build # next build with output: export -> web/out

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
