# Build the static Next.js UI and deploy to GitHub Pages. Triggered when the
# `data` branch updates (fresh pipeline output) or on manual dispatch.
# Finalized in Phase 5 alongside the web/ app.
name: deploy

on:
  # A push made with the built-in GITHUB_TOKEN (the pipeline's data-branch push)
  # can't trigger `on: push`, so key off the pipeline workflow completing instead.
  workflow_run:
    workflows: ["pipeline"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip if the pipeline run failed (workflow_dispatch has no workflow_run ctx).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4

      - name: Pull latest data
        uses: actions/checkout@v4
        with:
          ref: data
          path: web/public/data-src
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site
        working-directory: web
        env:
          # Project Pages serve under /<repo>; must match the GitHub repo name.
          NEXT_PUBLIC_BASE_PATH: /masresearch
        run: |
          # Copy generated JSON into the app's public/data
          mkdir -p public/data
          cp -r public/data-src/data/* public/data/ 2>/dev/null || true
          npm ci
          npm run build # next build with output: export -> web/out

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
